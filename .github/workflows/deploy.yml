name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from secrets
        run: envsubst < .env.example > .env.production
        env:
          TOKEN: ${{ secrets.TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
          AUTH_DOMAIN: ${{ secrets.AUTH_DOMAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          MESSAGING_SENDER_ID: ${{ secrets.MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.APP_ID }}
          MEASUREMENT_ID: ${{ secrets.MEASUREMENT_ID }}
          MONITOR_API_KEY: ${{ secrets.MONITOR_API_KEY }}
          MONITOR_METRIC_ID: ${{ secrets.MONITOR_METRIC_ID }}
          MONITOR_PAGE_ID: ${{ secrets.MONITOR_PAGE_ID }}
          TOP_GG_TOKEN: ${{ secrets.TOP_GG_TOKEN }}
          TRANSLATION_BASE_URL: ${{ secrets.TRANSLATION_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_ORGANIZATION: ${{ secrets.OPENAI_ORGANIZATION }}
          OPENAI_PROJECT: ${{ secrets.OPENAI_PROJECT }}
          OPEN_WEATHER_TOKEN: ${{ secrets.OPEN_WEATHER_TOKEN }}

      - name: Setup server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export BUN_INSTALL="$HOME/.bun"
            export NVM_DIR="$HOME/.nvm"
            export PATH="$BUN_INSTALL/bin:$HOME/.local/bin:$PATH"

            # Install system dependencies
            PACKAGES=""
            command -v make &> /dev/null || PACKAGES="$PACKAGES build-essential python3"
            command -v unzip &> /dev/null || PACKAGES="$PACKAGES unzip"
            command -v ffmpeg &> /dev/null || PACKAGES="$PACKAGES ffmpeg"
            if [ -n "$PACKAGES" ]; then
              sudo apt-get update && sudo apt-get install -y $PACKAGES
            fi

            # Install Node.js via nvm (needed for node-gyp compilation)
            if [ ! -d "$NVM_DIR" ]; then
              curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            fi
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            command -v node &> /dev/null || nvm install --lts

            # Install bun
            if ! command -v bun &> /dev/null; then
              curl -fsSL https://bun.sh/install | bash
              export PATH="$BUN_INSTALL/bin:$PATH"
            fi

            # Install pm2
            command -v pm2 &> /dev/null || bun install -g pm2

            # Clone repo if first deploy
            if [ ! -d ~/app/.git ]; then
              rm -rf ~/app
              git clone https://github.com/Maseshi/Shioru.git ~/app
            fi

            cd ~/app
            git pull origin main

      - name: Copy .env to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env.production"
          target: "~/app"

      - name: Install and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export BUN_INSTALL="$HOME/.bun"
            export NVM_DIR="$HOME/.nvm"
            export PATH="$BUN_INSTALL/bin:$HOME/.local/bin:$PATH"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd ~/app
            mv .env.production .env
            bun install
            pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
